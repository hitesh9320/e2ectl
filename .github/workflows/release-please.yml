name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Explain release token mode
        run: |
          if [ -n "${{ secrets.RELEASE_PLEASE_TOKEN }}" ]; then
            echo "Using RELEASE_PLEASE_TOKEN for release automation." >> "$GITHUB_STEP_SUMMARY"
            echo "Downstream workflows triggered by created tags/releases can run normally." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "RELEASE_PLEASE_TOKEN is not configured." >> "$GITHUB_STEP_SUMMARY"
            echo "Falling back to the default GITHUB_TOKEN will still open release PRs, but tags/releases created that way will not trigger downstream publish workflows." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
