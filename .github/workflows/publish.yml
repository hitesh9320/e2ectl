name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish, for example v1.0.0-rc.1
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  npm:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Verify release artefacts
        run: |
          make lint
          npm run coverage:unit
          make build

      - name: Decide npm dist-tag
        id: dist-tag
        run: |
          VERSION="${RELEASE_TAG#v}"

          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION to npm dist-tag $(cat "$GITHUB_OUTPUT" | awk -F= '/^tag=/{print $2}')." >> "$GITHUB_STEP_SUMMARY"

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --tag "${{ steps.dist-tag.outputs.tag }}"
